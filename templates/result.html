<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Result</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container py-5">

    <div class="card shadow-lg p-5 rounded-4">

        <h1 class="text-center text-primary mb-4">
            📊 ATS Analysis Result
        </h1>

        <h3 class="mb-3">ATS Score</h3>

        <div class="progress mb-5" style="height:35px;">

            <div
                class="progress-bar bg-success"
                role="progressbar"
                style="width: {{ score }}%;"
                aria-valuenow="{{ score }}"
                aria-valuemin="0"
                aria-valuemax="100">

                {{ score }}%

            </div>

        </div>

        <div class="row">

            <!-- Matched Skills -->
            <div class="col-md-6">

                <h4 class="text-success mb-3">
                    ✅ Matched Skills
                </h4>

                <ul class="list-group">

                    {% for skill in matched %}

                    <li class="list-group-item">
                        {{ skill }}
                    </li>

                    {% endfor %}

                </ul>

            </div>

            <!-- Missing Skills -->
            <div class="col-md-6">

                <h4 class="text-danger mb-3">
                    ❌ Missing Skills
                </h4>

                <ul class="list-group">

                    {% for skill in missing %}

                    <li class="list-group-item">
                        {{ skill }}
                    </li>

                    {% endfor %}

                </ul>

            </div>

        </div>

        <div class="text-center mt-5">

            <a href="/download/{{ report_path }}" class="btn btn-success btn-lg me-3">
                📄 Download ATS PDF Report
            </a>

            <a href="/" class="btn btn-primary btn-lg">
                Analyze Another Resume
            </a>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
